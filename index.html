<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>EXAR SYSTEM</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffe0;
    font-family:monospace;
    overflow:hidden;
}

/* شاشة البداية */
#login{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input{
    padding:10px;
    margin:10px;
    background:#111;
    border:1px solid #00ffe0;
    color:white;
}

/* النظام */
#system{
    display:none;
    padding:20px;
}

/* glitch */
.glitch{
    animation:glitch 1s infinite;
}

@keyframes glitch{
    0%{text-shadow:2px 2px red;}
    50%{text-shadow:-2px -2px blue;}
    100%{text-shadow:2px -2px red;}
}

/* أزرار */
button{
    padding:10px;
    margin:10px;
    background:#00ffe0;
    border:none;
    cursor:pointer;
}

.box{
    background:#111;
    padding:15px;
    margin:10px 0;
}

/* اهتزاز */
.shake{
    animation:shake 0.2s infinite;
}
@keyframes shake{
    0%{transform:translate(2px,2px);}
    50%{transform:translate(-2px,-2px);}
}
</style>

</head>

<body>

<!-- تسجيل دخول -->
<div id="login">
    <h1 class="glitch">EXAR SYSTEM</h1>
    <input id="user" placeholder="username">
    <input id="pass" placeholder="password" type="password">
    <button onclick="enter()">دخول</button>
</div>

<!-- النظام -->
<div id="system">
    <h2 class="glitch">لوحة التحكم</h2>

    <div class="box">
        اسم الهدف: <span id="target">@user</span>
    </div>

    <div class="box">
        عدد البلاغات: <span id="count">0</span>
    </div>

    <div class="box">
        نوع البلاغ:
        <select id="type">
            <option>انتحال شخصية</option>
            <option>انتهاك الخصوصية</option>
            <option>محتوى مخالف</option>
        </select>
    </div>

    <button onclick="start()">بدء التنفيذ ⚡</button>
    <button onclick="changeUser()">تغيير الهدف</button>
</div>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

function enter(){
    document.getElementById("login").style.display="none";
    document.getElementById("system").style.display="block";
}

/* تغيير اسم */
function changeUser(){
    let name = prompt("ادخل اليوزر:");
    document.getElementById("target").innerText = name;
}

/* تنفيذ */
function start(){
    let count = 0;
    let box = document.body;
    let sound = document.getElementById("sound");

    let interval = setInterval(()=>{
        count += Math.floor(Math.random()*30);
        document.getElementById("count").innerText = count;

        sound.play();
        box.classList.add("shake");

        setTimeout(()=>box.classList.remove("shake"),100);

        if(count >= 1000){
            clearInterval(interval);
            alert("تم التنفيذ بنجاح ✅");
        }
    },150);
}

</script>

</body>
</html>
