<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>EXAR ULTRA</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff9f;
    font-family:monospace;
    overflow:hidden;
}

/* شاشة */
#system{
    padding:15px;
}

/* كاميرا */
video{
    width:100%;
    max-height:150px;
    border:1px solid #00ff9f;
    margin-bottom:10px;
}

/* Terminal */
#terminal{
    background:#050505;
    height:150px;
    overflow:auto;
    padding:10px;
    border:1px solid #00ff9f;
}

/* إنذار */
#alert{
    display:none;
    background:red;
    color:white;
    text-align:center;
    padding:10px;
    animation:flash 0.5s infinite;
}
@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.2;}
}

/* glitch */
.glitch{
    animation:glitch 1s infinite;
}
@keyframes glitch{
    0%{text-shadow:2px 2px red;}
    50%{text-shadow:-2px -2px blue;}
}

/* اهتزاز */
.shake{
    animation:shake 0.2s infinite;
}
@keyframes shake{
    0%{transform:translate(2px,2px);}
    50%{transform:translate(-2px,-2px);}
}

.box{
    background:#111;
    padding:8px;
    margin:5px 0;
}
</style>

</head>

<body>

<div id="system">

<h2 class="glitch">EXAR ULTRA SYSTEM</h2>

<div id="alert">⚠ SYSTEM TAKEOVER ⚠</div>

<video id="cam" autoplay></video>

<div id="terminal"></div>

<div class="box">IP: <span id="ip">...</span></div>
<div class="box">Location: <span id="loc">...</span></div>
<div class="box">User: <span id="user">Unknown</span></div>
<div class="box">Countdown: <span id="time">--</span></div>

<button onclick="start()">START ⚡</button>

</div>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

function log(text){
    let t = document.getElementById("terminal");
    let line = document.createElement("div");
    let i=0;

    let typing = setInterval(()=>{
        line.innerText += text[i];
        i++;
        if(i>=text.length){
            clearInterval(typing);
            t.appendChild(line);
            t.scrollTop = t.scrollHeight;
        }
    },20);
}

/* IP وهمي */
function fakeIP(){
    return Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255);
}

/* تشغيل الكاميرا */
function startCam(){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("cam").srcObject = stream;
})
.catch(()=>{
log("Camera blocked ❌");
});
}

/* بدء */
function start(){

    let sound = document.getElementById("sound");

    startCam();

    document.getElementById("ip").innerText = fakeIP();
    document.getElementById("loc").innerText = "Baghdad";
    document.getElementById("user").innerText = "Detected";

    log("Initializing...");
    log("Accessing device...");
    log("Bypassing security...");

    let time = 10;

    let countdown = setInterval(()=>{
        document.getElementById("time").innerText = time;
        time--;

        sound.play();
        document.body.classList.add("shake");

        setTimeout(()=>document.body.classList.remove("shake"),100);

        if(time <= 0){
            clearInterval(countdown);

            document.getElementById("alert").style.display="block";
            log("!!! FULL CONTROL ACHIEVED !!!");

            setTimeout(()=>{
                document.body.style.background="red";
                alert("SYSTEM OVERRIDDEN 💀");
            },1500);
        }

    },1000);
}

</script>

</body>
</html>
