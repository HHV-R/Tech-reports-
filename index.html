<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>System Hack</title>

<style>
body{
    margin:0;
    background:black;
    font-family:Tahoma;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    width:330px;
    padding:20px;
    border-radius:20px;
    background:#0d0d0d;
    box-shadow:0 0 25px #00ffe0;
    position:relative;
}

/* glitch effect */
.glitch{
    color:#ff0055;
    font-size:22px;
    text-align:center;
    animation: glitch 1s infinite;
}

@keyframes glitch{
    0%{text-shadow:2px 2px #00ffe0;}
    50%{text-shadow:-2px -2px #ff00ff;}
    100%{text-shadow:2px -2px #00ffe0;}
}

.label{
    color:#00ffe0;
    margin:10px 0 5px;
}

.input{
    background:#111;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.button{
    margin-top:15px;
    padding:12px;
    text-align:center;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffe0,#ff0055);
    cursor:pointer;
}

/* shake */
.shake{
    animation: shake 0.2s infinite;
}

@keyframes shake{
    0%{transform:translate(2px,2px);}
    50%{transform:translate(-2px,-2px);}
    100%{transform:translate(2px,-2px);}
}

</style>

</head>

<body>

<div class="container" id="box">

    <div class="glitch">النظام المتقدم</div>

    <div class="label">اسم المستهدف</div>
    <div class="input" id="user"></div>

    <div class="label">عدد البلاغات</div>
    <div class="input" id="count">0</div>

    <div class="label">نوع البلاغ</div>
    <div class="input">انتهاك الخصوصية 🛡️</div>

    <div class="label">تم بواسطة</div>
    <div class="input">Ali Hazim</div>

    <div class="button" onclick="start()">بدء التنفيذ ⚡</div>

</div>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

// كتابة تلقائية
let username = "@user7377318496173";
let i = 0;
let typing = setInterval(()=>{
    document.getElementById("user").innerText += username[i];
    i++;
    if(i >= username.length){
        clearInterval(typing);
    }
},100);

function start(){
    let num = 0;
    let box = document.getElementById("box");
    let sound = document.getElementById("sound");

    let interval = setInterval(()=>{
        num += Math.floor(Math.random()*40);
        document.getElementById("count").innerText = num;

        // صوت
        sound.play();

        // اهتزاز
        box.classList.add("shake");
        setTimeout(()=> box.classList.remove("shake"),100);

        if(num >= 900){
            clearInterval(interval);
        }
    },150);
}

</script>

</body>
</html>
